<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="/static/CSS/cadastrocnpj.css">
</head>
<body>
    <div class="box">
        <div class="group">
            <div class="overlap-group">
                <!-- Área de Cadastro -->
                <div class="overlap">



                    <form method="post" action="/candidato/add" th:object="${candidato}">
                        <input type="hidden" th:value="${candidato.cpf}" name="cpf" />
                        <div class="mb-3">
                            <label class="form-label">Cpf</label>
                            <input type="text" class="form-control" name="cpf" th:value="${candidato.cpf}">

                        </div>
                        <div class="mb-3">
                            <label class="form-label">Nome Completo</label>
                            <input type="text" class="form-control" name="nome" th:value="${{candidato.nome}}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Data de Nascimento</label>
                            <input type="date" class="form-control" name="dataNasc" th:value="${{candidato.dataNasc}}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">E-mail</label>
                            <input type="email" class="form-control" name="email" th:value="${{candidato.email}}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Insira a sua Senha</label>
                            <input type="password" class="form-control" name="senha" th:value="${{candidato.senha}}">
                        </div>

                        <button type="submit" class="btn btn-primary">Cadastrar</button>
                    </form>


                </div>

                <!-- Área Lateral -->
                <div class="lado-esquerdo">
                    <img class="azul" src="/static/Imagens/logo.jpg" alt="Logo">
                    <div class="possuicadastro">Já possui cadastro?</div>
                    <button type="button" class="acesse" onclick="window.location.href='logincnpj.html';">Entrar</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
